<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - 4TH GROUND</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
    
    <nav class="absolute top-0 w-full z-20 bg-gradient-to-b from-black/80 to-transparent">
        <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <img src="/logo.png" alt="4TH GROUND" class="h-8">
            </a>
            <div class="flex gap-4 md:gap-8 text-xs md:text-sm font-medium">
                <a href="/" class="text-zinc-300 hover:text-white">Home</a>
                <a href="/about/" class="text-zinc-300 hover:text-white">About</a>
                <a href="/services/" class="text-zinc-300 hover:text-white">Services</a>
                <a href="/team/" class="text-zinc-300 hover:text-white">Team</a>
                <a href="/contact/" class="text-white">Contact</a>
            </div>
        </div>
    </nav>

    <div class="relative h- w-full overflow-hidden">
        <img src="https://mzone.b-cdn.net/vlcsnap-2026-06-01-04h48m45s377.png" 
             alt="4th Ground" 
             class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-black/30"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-black/90 via-black/50 to-transparent"></div>
        <div class="absolute inset-0 flex items-end">
            <div class="w-full max-w-7xl mx-auto px-6 pb-8 md:pb-10">
                <h1 class="text-4xl md:text-6xl font-bold tracking-tight">Get In Touch</h1>
            </div>
        </div>
    </div>

    <section class="max-w-5xl mx-auto px-6 py-12 md:py-16 text-center">
        <div class="space-y-8">
            <p class="text-xl md:text-2xl text-zinc-300">For distribution inquiries</p>
            <div>
                <a href="mailto:acquisitions@4thground.com" class="inline-block bg-white text-black font-semibold px-8 py-4 rounded-md hover:bg-zinc-200 transition text-lg">
                    acquisitions@4thground.com
                </a>
            </div>
        </div>
    </section>

    <footer class="border-t border-zinc-800 py-8 text-center text-zinc-500 text-sm">
        <p>© 2026 4TH GROUND. All Rights Reserved.</p>
    </footer>

</body>
</html>
