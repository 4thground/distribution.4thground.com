<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="4TH GROUND is launching soon. The home base for all who fall for Movies.">
<meta name="robots" content="noindex, follow">
<title>Launching Soon - 4TH GROUND</title>
<style>
  :root{
    --bg:#000;
    --fg:#fff;
    --muted:#a1a1aa;
    --glass:rgba(255,255,255,.06);
    --blur:24px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Segoe UI,Roboto,Helvetica,Arial;overflow:hidden}
  
  body{
    background: radial-gradient(1200px 600px at 50% -10%,rgba(255,255,255,.08),transparent 60%), #000;
  }

  .stage{
    height:100svh;
    width:100%;
    display:grid;
    grid-template-rows: auto 1fr auto;
    place-items:center;
    padding: 32px 24px 0;
  }

  /* 1. Subheader - Apple TV style glass pill */
  .subheader{
    max-width: 880px;
    text-align:center;
    font-size: clamp(16px, 2.2vw, 20px);
    font-weight: 500;
    line-height:1.5;
    letter-spacing:-.01em;
    color:#e5e5e7;
    background: var(--glass);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border:1px solid rgba(255,255,255,.08);
    border-radius: 999px;
    padding:14px 24px;
    z-index:10;
  }
  .subheader sup{font-size:.6em;vertical-align:top}

  /* 2. Quote Center Stage + Apple TV Flare Border */
  .quote-wrap{
    position:relative;
    width:100%;
    max-width: 1100px;
    height: 100%;
    display:grid;
    place-items:center;
    overflow:hidden;
    border-radius: 32px; /* rounded Apple TV card */
    isolation:isolate; /* keep glow behind text */
  }
  /* The rotating flare border */
  .quote-wrap::before{
    content:"";
    position:absolute;
    inset:0;
    padding:3px; /* border thickness */
    border-radius:inherit;
    background: conic-gradient(
      from 0deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0) 70%,
      rgba(255,255,255,.55) 78%,
      rgba(180,220,255,.8) 85%, 
      rgba(255,255,255,.55) 92%,
      rgba(255,255,255,0) 100%
    );
    -webkit-mask: 
      linear-gradient(#fff 0 0) content-box, 
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    animation: flare-rotate 8s linear infinite;
    filter: blur(.5px); /* soft Apple TV glow */
    pointer-events:none;
    z-index:1;
  }
  /* Inner glass panel so text isn't on the glow directly */
  .quote-wrap::after{
    content:"";
    position:absolute;
    inset:3px;
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: calc(32px - 1.5px);
    z-index:2;
  }
  @keyframes flare-rotate{
    to{transform: rotate(360deg)}
  }

  .quote{
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    text-align:center;
    padding:0 24px;
    opacity:0;
    transform: scale(0.98);
    transition: opacity 1.2s ease, transform 5s ease-out;
    will-change: opacity, transform;
    pointer-events:none;
    z-index:3; /* above the glass */
  }
  .quote.active{
    opacity:1;
    transform: scale(1.04); /* slow zoom for 5s */
  }
  .quote-text{
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 700;
    letter-spacing:-.02em;
    line-height:1.1;
    max-width: 18ch;
    text-shadow: 0 10px 40px rgba(0,0,0,.6);
  }

  /* 3. Launching Soon Marquee */
  .marquee{
    width:100%;
    overflow:hidden;
    padding-bottom: 40px;
    mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
    -webkit-mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
  }
  .marquee-track{
    display:flex;
    width:max-content;
    animation: scroll-left 25s linear infinite;
    gap: 80px;
  }
  .marquee span{
    font-size: clamp(16px, 2.5vw, 24px);
    font-weight: 700;
    letter-spacing:.4em;
    color: var(--muted);
    white-space:nowrap;
  }
  @keyframes scroll-left{
    from{transform: translateX(0)}
    to{transform: translateX(-50%)} /* 50% because we duplicate the set */
  }

  /* Back button - bottom right, subtle */
  .back{
    position:absolute;
    right:20px;
    bottom:20px;
    border:1px solid rgba(255,255,255,.2);
    background: var(--glass);
    backdrop-filter: blur(12px);
    color:#fff;
    padding:10px 16px;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
    text-decoration:none;
    transition:.2s;
    z-index:20;
  }
  .back:hover{border-color:#fff;background:rgba(255,255,255,.12)}
  
  @media (max-width: 640px){
    .subheader{padding:12px 18px;font-size:15px}
    .marquee{padding-bottom:24px}
    .quote-wrap{border-radius:24px}
    .quote-wrap::after{border-radius: calc(24px - 1.5px)}
  }
</style>
</head>
<body>

  <div class="stage">
    
    <!-- 1. Subheader stays -->
    <h1 class="subheader">
      No handrails here. Don’t fall off. But if you do, welcome to 4<sup>TH</sup> GROUND: The home base for all who fall for Movies.
    </h1>

    <!-- 2. Quote Rotator Center -->
    <div class="quote-wrap" id="quoteStage" aria-live="polite"></div>

    <!-- 3. Infinite Marquee -->
    <div class="marquee" aria-hidden="true">
      <div class="marquee-track" id="marqueeTrack">
        <!-- JS will duplicate this -->
        <span>LAUNCHING SOON!</span>
        <span>LAUNCHING SOON!</span>
        <span>LAUNCHING SOON!</span>
        <span>LAUNCHING SOON!</span>
        <span>LAUNCHING SOON!</span>
      </div>
    </div>

  </div>

  <a href="https://4thground.com" class="back">BACK</a>

<script>
  // 20 Original 4th Ground Quotes - Film Lover Energy
  const quotes = [
    `We don’t skim scenes. We live in them.`,
    `Built for pause, rewind, and rewatch.`,
    `If it doesn’t hit on the 2nd watch, it’s not on 4th Ground.`,
    `No autoplay guilt. Just intentional viewing.`,
    `For people who watch credits to the end.`,
    `Collect moments, not just titles.`,
    `Silence your phone. Raise the volume.`,
    `A film deserves your full screen.`,
    `Not background noise. Main event cinema.`,
    `We curate for the 3rd watch, not the 3-second scroll.`,
    `Fall for the film, not the hype.`,
    `Because a great film rewires you.`,
    `Leave the feed. Enter the film.`,
    `Cinema that stays after the screen goes dark.`,
    `Choose films that choose you back.`,
    `Less scrolling. More feeling.`,
    `Every title here earned its runtime.`,
    `We respect your time with films that last.`,
    `Watch once. Remember always.`,
    `This is for the ones who still love movies.`
  ];

  const stage = document.getElementById('quoteStage');
  let index = 0;

  function showQuote(i){
    stage.innerHTML = `<div class="quote active"><div class="quote-text">${quotes[i]}</div></div>`;
    // remove after transition to reset zoom for next
    setTimeout(() => {
      const el = stage.querySelector('.quote');
      if(el) el.classList.remove('active'); // fade out + reset scale
    }, 3800); // start fade out before 5s is up
  }

  function next(){
    showQuote(index);
    index = (index + 1) % quotes.length;
  }

  next(); // first quote immediately
  setInterval(next, 5000); // 5s per quote

  // Duplicate marquee content for seamless loop
  const track = document.getElementById('marqueeTrack');
  track.innerHTML += track.innerHTML;
</script>
</body>
</html>
